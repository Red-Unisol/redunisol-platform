name: Validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r kestra/tools/requirements.txt

      - name: Validate repository structure
        run: python kestra/tools/validate_kestra.py

      - name: Run Marketing CRM unit tests
        run: python -m unittest discover -s kestra/automations/marketing-crm/files/bitrix24_form_flow/tests -p "test_*.py"
        env:
          PYTHONPATH: kestra/automations/marketing-crm/files

      - name: Dry-run Marketing CRM deploy
        run: python kestra/tools/deploy_kestra.py --environment dev --domain marketing-crm --dry-run
