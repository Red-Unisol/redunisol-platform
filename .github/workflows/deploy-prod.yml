name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to deploy
        required: true
        type: choice
        options:
          - marketing-crm
          - analisis-credito
          - ahorros-amt
          - cobranzas
          - contabilidad

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: kestra-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Deploy selected domain to prod
        run: |
          python tools/deploy_kestra.py --environment prod --domain "${{ inputs.domain }}"
        env:
          KESTRA_URL: ${{ secrets.KESTRA_URL }}
          KESTRA_USERNAME: ${{ secrets.KESTRA_USERNAME }}
          KESTRA_PASSWORD: ${{ secrets.KESTRA_PASSWORD }}
          KESTRA_TENANT: ${{ secrets.KESTRA_TENANT }}
