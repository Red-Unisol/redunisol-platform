name: Publish Analisis Credito ARCA Padron A13 Image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'kestra/automations/analisis-credito/docker/arca-padron-a13/**'
      - 'kestra/automations/analisis-credito/flows/consulta_padron_a13.yaml'
      - '.github/workflows/publish-analisis-credito-arca-padron-a13-image.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-analisis-credito-arca-padron-a13-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/red-unisol/analisis-credito-arca-padron-a13
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: kestra/automations/analisis-credito/docker/arca-padron-a13
          file: kestra/automations/analisis-credito/docker/arca-padron-a13/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
