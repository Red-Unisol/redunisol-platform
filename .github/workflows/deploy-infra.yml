name: Deploy Infra

on:
  push:
    branches:
      - main
    paths:
      - 'kestra/platform/infra/docker-compose.yml'
      - 'kestra/platform/infra/application.yaml'
      - 'kestra/platform/infra/kestra-runtime.env.enc'
      - 'kestra/tools/manage_encrypted_env.py'
      - 'kestra/tools/requirements.txt'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: vps-infra
    env:
      TARGET_DIR: /opt/kestra
      SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
      SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      SSH_USER: ${{ secrets.VPS_SSH_USER }}
      RUNTIME_ENV_KEY: ${{ secrets.RUNTIME_ENV_KEY }}
    steps:
      - name: Allow manual infra deploy only from main by Nasst
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          [ "${GITHUB_ACTOR}" = "Nasst" ]
          [ "${GITHUB_REF}" = "refs/heads/main" ]

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r kestra/tools/requirements.txt

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust target host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Decrypt runtime env
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$RUNTIME_ENV_KEY" > "$RUNNER_TEMP/kestra-runtime.key"
          python kestra/tools/manage_encrypted_env.py decrypt \
            --key-file "$RUNNER_TEMP/kestra-runtime.key" \
            --input kestra/platform/infra/kestra-runtime.env.enc \
            --output kestra/platform/infra/kestra-runtime.env \
            --force

      - name: Upload staged infra files
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_STAGING_DIR="/tmp/kestra-infra-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "REMOTE_STAGING_DIR=$REMOTE_STAGING_DIR" >> "$GITHUB_ENV"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_STAGING_DIR'"
          scp -P "$SSH_PORT" kestra/platform/infra/docker-compose.yml "$SSH_USER@$SSH_HOST:$REMOTE_STAGING_DIR/docker-compose.yml"
          scp -P "$SSH_PORT" kestra/platform/infra/application.yaml "$SSH_USER@$SSH_HOST:$REMOTE_STAGING_DIR/application.yaml"
          scp -P "$SSH_PORT" kestra/platform/infra/kestra-runtime.env "$SSH_USER@$SSH_HOST:$REMOTE_STAGING_DIR/.env"

      - name: Apply infra on VPS
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s -- "$TARGET_DIR" "$REMOTE_STAGING_DIR" <<'EOF'
          set -euo pipefail
          target_dir="$1"
          staging_dir="$2"

          trap 'rm -rf "$staging_dir"' EXIT

          install -d -m 755 "$target_dir"
          install -d -m 755 "$target_dir/data/postgres"
          install -d -m 755 "$target_dir/data/storage"
          install -d -m 755 "$target_dir/tmp"

          docker compose \
            --env-file "$staging_dir/.env" \
            -f "$staging_dir/docker-compose.yml" \
            config -q

          install -m 600 "$staging_dir/.env" "$target_dir/.env"
          install -m 644 "$staging_dir/docker-compose.yml" "$target_dir/docker-compose.yml"
          install -m 644 "$staging_dir/application.yaml" "$target_dir/application.yaml"

          cd "$target_dir"
          docker compose --env-file .env pull
          docker compose --env-file .env up -d
          docker compose ps
          EOF

      - name: Clean local decrypted files
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/kestra-runtime.key"
          rm -f kestra/platform/infra/kestra-runtime.env
