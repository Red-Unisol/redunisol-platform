<VirtualHost *:80>
    ServerName kestra.redunisol.com.ar

    ProxyRequests Off
    ProxyPreserveHost On
    AllowEncodedSlashes NoDecode

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass "/" "http://127.0.0.1:8080/" retry=0 timeout=300
    ProxyPassReverse "/" "http://127.0.0.1:8080/"

    ErrorLog "logs/kestra_redunisol_error.log"
    CustomLog "logs/kestra_redunisol_access.log" combined
</VirtualHost>
