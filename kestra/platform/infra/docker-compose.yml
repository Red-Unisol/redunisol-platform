      ENV_ARCA_PADRON_A13_TIMEOUT_SECONDS: ${ENV_ARCA_PADRON_A13_TIMEOUT_SECONDS}
      SECRET_BITRIX24_WEBHOOK_PATH: ${SECRET_BITRIX24_WEBHOOK_PATH}
