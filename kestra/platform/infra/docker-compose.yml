      SECRET_BITRIX24_COBRANZAS_PROMESA_WEBHOOK_KEY: ${SECRET_BITRIX24_COBRANZAS_PROMESA_WEBHOOK_KEY}
      SECRET_BITRIX24_COBRANZAS_PROMESA_APP_TOKEN: ${SECRET_BITRIX24_COBRANZAS_PROMESA_APP_TOKEN}
      SECRET_EDNA_API_KEY: ${SECRET_EDNA_API_KEY}
      SECRET_ANALISIS_CREDITO_WEBHOOK_KEY: ${SECRET_ANALISIS_CREDITO_WEBHOOK_KEY}
      SECRET_ANALISIS_CREDITO_QUIEBRA_WEBHOOK_KEY: ${SECRET_ANALISIS_CREDITO_QUIEBRA_WEBHOOK_KEY}
      SECRET_ANALISIS_CREDITO_INCOMING_METAMAP_WEBHOOK_KEY: ${SECRET_ANALISIS_CREDITO_INCOMING_METAMAP_WEBHOOK_KEY}
      SECRET_DEVEXPRESS_EVALUATE_API_BASE_URL: ${SECRET_DEVEXPRESS_EVALUATE_API_BASE_URL}
      SECRET_CREDIX_CLIENTE: ${SECRET_CREDIX_CLIENTE}
      SECRET_CREDIX_USER: ${SECRET_CREDIX_USER}
      SECRET_CREDIX_PASS: ${SECRET_CREDIX_PASS}
      SECRET_CIDI_USER: ${SECRET_CIDI_USER}
      SECRET_CIDI_PASS: ${SECRET_CIDI_PASS}
