      SECRET_CAJA_ENCRYPT_PASS: ${SECRET_CAJA_ENCRYPT_PASS}
      SECRET_ANALISIS_CREDITO_CAJA_WEBHOOK_KEY: ${SECRET_ANALISIS_CREDITO_CAJA_WEBHOOK_KEY}
      SECRET_ARCA_PADRON_A13_CERT_PEM_B64: ${SECRET_ARCA_PADRON_A13_CERT_PEM_B64}
      SECRET_ARCA_PADRON_A13_KEY_PEM_B64: ${SECRET_ARCA_PADRON_A13_KEY_PEM_B64}
      SECRET_ANALISIS_CREDITO_ARCA_PADRON_A13_WEBHOOK_KEY: ${SECRET_ANALISIS_CREDITO_ARCA_PADRON_A13_WEBHOOK_KEY}
    networks:
      - kestra_net

networks:
  kestra_net:
    name: kestra_net
